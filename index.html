<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon-180.png">
	<link rel="icon" href="icon-192.png">
<title>タブフォルダ</title>
<style>
  :root {
    --bg: #FAF7F1;
    --ink: #2E2A24;
    --line: #DCD4C6;
    --muted: #948C7C;
    --muted-light: #C6BDAC;
    --accent: #C1573F;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Hiragino Sans', 'Yu Gothic', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
  }
  button, input { font-family: inherit; }

  /* tab bar */
  #tabbar {
    display: flex;
    align-items: flex-end;
    gap: 0;
    padding: 14px 10px 0 10px;
    border-bottom: 1px solid var(--line);
    background: #fff;
    overflow-x: auto;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .tab {
    position: relative;
    padding: 8px 16px 12px 16px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .tab-label {
    font-size: 15px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.02em;
  }
  .tab.active .tab-label { font-weight: 700; }
  .tab-underline {
    position: absolute;
    bottom: 0; left: 8px; right: 8px;
    height: 3px;
    border-radius: 3px;
  }
  .tab-close {
    border: none; background: none; padding: 0; cursor: pointer;
    display: flex; color: var(--muted-light);
  }
  .tab-edit-input {
    font-size: 15px; font-weight: 600; border: none;
    background: transparent; width: 72px; outline: none; color: var(--ink);
    border-bottom: 2px solid var(--accent);
  }
  #addCatBtn {
    border: none; background: none; cursor: pointer; color: var(--muted);
    padding: 8px 12px 12px 12px; display: flex; align-items: center; flex-shrink: 0;
  }
  #addCatForm {
    display: flex; align-items: center; gap: 4px; padding: 6px 8px; margin-bottom: 8px; flex-shrink: 0;
  }
  #addCatForm input {
    font-size: 14px; padding: 4px 8px; border-radius: 6px; border: 1px solid var(--line);
    width: 90px; outline: none;
  }
  #addCatForm button {
    border: none; background: var(--accent); color: #fff; border-radius: 6px;
    padding: 5px 8px; cursor: pointer; font-size: 13px;
  }

  /* search row */
  #searchRow { padding: 14px 14px 6px 14px; display: flex; align-items: center; gap: 8px; }
  #searchBox {
    display: flex; align-items: center; gap: 8px; background: #fff;
    border: 1px solid var(--line); border-radius: 12px; padding: 10px 14px;
    flex: 1;
  }
  #searchBox input {
    border: none; outline: none; background: transparent; flex: 1; font-size: 14px; color: var(--ink);
  }
  #addSiteBtn {
    border: none; background: var(--accent); color: #fff; border-radius: 12px;
    height: 42px; flex-shrink: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    padding: 0 14px; font-size: 13px; font-weight: 700; white-space: nowrap;
  }
  #reorderBtn {
    border: 1px solid var(--line); background: #fff; color: var(--ink); border-radius: 12px;
    width: 42px; height: 42px; flex-shrink: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  #reorderBtn.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .card-move { display: flex; gap: 2px; flex-shrink: 0; }
  .card-move button {
    border: none; background: none; color: var(--muted-light); cursor: pointer; padding: 2px;
  }
  .card-move button:disabled { opacity: 0.25; cursor: default; }

  /* grid */
  #grid {
    padding: 10px 14px 100px 14px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    align-content: start;
  }
  .card {
    text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 8px;
  }
  .card-thumb {
    aspect-ratio: 1.3; border-radius: 14px; background: #fff;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .card-thumb img { width: 32px; height: 32px; opacity: 0.85; }
  .card-row {
    display: flex; align-items: center; justify-content: space-between; gap: 4px;
  }
  .card-title {
    font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card-del {
    border: none; background: none; color: var(--muted-light); cursor: pointer; padding: 2px; flex-shrink: 0;
  }
  #emptyMsg { grid-column: 1 / -1; text-align: center; color: var(--muted); font-size: 13px; padding: 20px 0; display: none; }

  /* modal */
  #modalOverlay {
    position: fixed; inset: 0; background: rgba(46,42,36,0.35);
    display: none; align-items: flex-end; z-index: 20;
  }
  #modalOverlay.open { display: flex; }
  #modalSheet {
    background: #fff; width: 100%; border-radius: 18px 18px 0 0;
    padding: 20px 18px 26px 18px; display: flex; flex-direction: column; gap: 12px;
  }
  #modalHeader { display: flex; align-items: center; justify-content: space-between; }
  #modalHeader span { font-size: 15px; font-weight: 700; }
  #modalHeader button { border: none; background: none; color: var(--muted); cursor: pointer; }
  #modalSheet input {
    font-size: 14px; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--line); outline: none;
  }
  #modalSubmit {
    border: none; background: var(--accent); color: #fff; border-radius: 10px;
    padding: 12px 0; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px;
  }
  #galaxyCheckRow {
    display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink);
    padding: 2px 2px;
  }
  #galaxyCheckRow input { width: 16px; height: 16px; margin: 0; accent-color: var(--accent); }
  #moveSection { display: none; flex-direction: column; gap: 8px; }
  #moveSection.show { display: flex; }
  #moveDivider { border-top: 1px solid var(--line); margin-top: 4px; }
  #moveLabel { font-size: 12px; color: var(--muted); font-weight: 600; }
  #moveTargetSelect {
    font-size: 14px; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--line); outline: none;
    background: #fff; color: var(--ink);
  }
  #moveBtnRow { display: flex; gap: 8px; }
  #moveBtnRow button {
    flex: 1; border: 1px solid var(--line); background: #fff; color: var(--ink); border-radius: 10px;
    padding: 11px 0; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  #moveBtnRow button:disabled { opacity: 0.4; cursor: default; }

  /* group menu button */
  #groupMenuBtn {
    border: none; background: none; cursor: pointer; color: var(--muted);
    padding: 8px 10px 12px 6px; display: flex; align-items: center; flex-shrink: 0;
  }

  /* group manage modal */
  #groupModalOverlay {
    position: fixed; inset: 0; background: rgba(46,42,36,0.35);
    display: none; align-items: flex-end; z-index: 20;
  }
  #groupModalOverlay.open { display: flex; }
  #groupModalSheet {
    background: #fff; width: 100%; border-radius: 18px 18px 0 0;
    padding: 20px 18px 26px 18px; display: flex; flex-direction: column; gap: 12px;
    max-height: 78vh; overflow-y: auto;
  }
  #groupModalHeader { display: flex; align-items: center; justify-content: space-between; }
  #groupModalHeader span { font-size: 15px; font-weight: 700; }
  #groupModalHeader button { border: none; background: none; color: var(--muted); cursor: pointer; }
  .group-row {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 4px; border-bottom: 1px solid var(--line);
  }
  .group-row:last-child { border-bottom: none; }
  .group-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .group-name {
    flex: 1; font-size: 14px; font-weight: 600; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .group-actions { display: flex; gap: 2px; flex-shrink: 0; }
  .group-actions button {
    border: none; background: none; color: var(--muted-light); cursor: pointer; padding: 4px;
    display: flex; align-items: center;
  }
  .group-actions button:disabled { opacity: 0.25; cursor: default; }
  svg { display: block; }
</style>
</head>
<body>

<div id="tabbar"></div>
<div id="searchRow">
  <div id="searchBox">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#948C7C" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="searchInput" placeholder="検索…" />
  </div>
  <button id="addSiteBtn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span>追加</span>
  </button>
  <button id="reorderBtn" title="並び替え">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 3 4 7l4 4"/><path d="M4 7h16"/><path d="M16 21l4-4-4-4"/><path d="M20 17H4"/></svg>
  </button>
</div>
<div id="grid"></div>

<div id="modalOverlay">
  <div id="modalSheet">
    <div id="modalHeader">
      <span id="modalTitle">サイトを追加</span>
      <button id="modalClose">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <input id="siteUrlInput" placeholder="URL（例: example.com）" />
    <input id="siteTitleInput" placeholder="表示名（空欄ならサイト名を自動取得）" />
    <label id="galaxyCheckRow">
      <input type="checkbox" id="siteGalaxyCheck" />
      <span>GALAXYブラウザで開く</span>
    </label>
    <button id="modalSubmit">追加する</button>
    <div id="moveSection">
      <div id="moveDivider"></div>
      <span id="moveLabel">別のグループへ</span>
      <select id="moveTargetSelect"></select>
      <div id="moveBtnRow">
        <button id="moveBtn">移動する</button>
        <button id="copyBtn">コピーする</button>
      </div>
    </div>
  </div>
</div>

<div id="groupModalOverlay">
  <div id="groupModalSheet">
    <div id="groupModalHeader">
      <span>グループ管理</span>
      <button id="groupModalClose">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="groupList"></div>
  </div>
</div>

<script>
  const STORAGE_KEY = "tabfolder_categories_v1";
  const ACCENTS = ["#C1573F", "#4A7C6F", "#8C6E45", "#5C6B8C"];

  function defaultData() {
    return [
      { id: "cat_1", name: "ポケカ", color: ACCENTS[0], sites: [
        { id: "s1", title: "公式サイト", url: "https://www.pokemon-card.com" },
        { id: "s2", title: "相場チェック", url: "https://yuyu-tei.jp" },
      ]},
      { id: "cat_2", name: "仕事", color: ACCENTS[1], sites: [] },
      { id: "cat_3", name: "競馬", color: ACCENTS[2], sites: [
        { id: "s3", title: "JRA公式", url: "https://www.jra.go.jp" },
      ]},
    ];
  }

  let categories = [];
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    categories = raw ? JSON.parse(raw) : defaultData();
  } catch (e) { categories = defaultData(); }

  let activeId = categories[0] ? categories[0].id : null;
  let query = "";
  let reorderMode = false;
  let editingCatId = null;

  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(categories)); } catch (e) {}
  }

  function toIntentUrl(url) {
    try {
      const u = new URL(url);
      const scheme = u.protocol.replace(":", "");
      const rest = u.host + u.pathname + u.search + u.hash;
      return "intent://" + rest + "#Intent;scheme=" + scheme +
        ";package=com.sec.android.app.sbrowser;S.browser_fallback_url=" + encodeURIComponent(url) + ";end";
    } catch { return url; }
  }

  function faviconFor(url) {
    try {
      const u = new URL(url);
      return "https://www.google.com/s2/favicons?domain=" + u.hostname + "&sz=64";
    } catch { return null; }
  }

  function esc(str) {
    const d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }

  function getActive() {
    return categories.find(c => c.id === activeId);
  }

  function renderTabs() {
    const bar = document.getElementById("tabbar");
    bar.innerHTML = "";
    categories.forEach(c => {
      const isActive = c.id === activeId;
      const tab = document.createElement("div");
      tab.className = "tab" + (isActive ? " active" : "");
      tab.onclick = () => { activeId = c.id; query = ""; document.getElementById("searchInput").value = ""; render(); };
      tab.ondblclick = (e) => { e.stopPropagation(); editingCatId = c.id; render(); };

      if (editingCatId === c.id) {
        const input = document.createElement("input");
        input.className = "tab-edit-input";
        input.value = c.name;
        input.onclick = (e) => e.stopPropagation();
        input.onkeydown = (e) => {
          if (e.key === "Enter") { renameCategory(c.id, input.value); }
          if (e.key === "Escape") { editingCatId = null; render(); }
        };
        input.onblur = () => renameCategory(c.id, input.value);
        tab.appendChild(input);
        bar.appendChild(tab);
        setTimeout(() => input.focus(), 0);
      } else {
        const label = document.createElement("span");
        label.className = "tab-label";
        label.textContent = c.name;
        label.style.color = isActive ? c.color : "";
        tab.appendChild(label);

        if (categories.length > 1 && isActive) {
          const closeBtn = document.createElement("button");
          closeBtn.className = "tab-close";
          closeBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
          closeBtn.onclick = (e) => { e.stopPropagation(); removeCategory(c.id); };
          tab.appendChild(closeBtn);
        }
        if (isActive) {
          const underline = document.createElement("div");
          underline.className = "tab-underline";
          underline.style.background = c.color;
          tab.appendChild(underline);
        }
        bar.appendChild(tab);
      }
    });

    // add category control
    const addForm = document.createElement("div");
    addForm.id = "addCatForm";
    addForm.style.display = "none";
    addForm.innerHTML = '<input id="newCatInput" placeholder="フォルダ名" /><button id="newCatSubmit">追加</button>';
    bar.appendChild(addForm);

    const addBtn = document.createElement("button");
    addBtn.id = "addCatBtn";
    addBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
    addBtn.onclick = () => {
      addBtn.style.display = "none";
      addForm.style.display = "flex";
      const input = document.getElementById("newCatInput");
      input.focus();
      input.onkeydown = (e) => { if (e.key === "Enter") addCategory(input.value); if (e.key === "Escape") render(); };
    };
    document.getElementById("newCatSubmitHandler");
    bar.appendChild(addBtn);

    addForm.querySelector("#newCatSubmit")?.addEventListener("click", () => {
      addCategory(document.getElementById("newCatInput").value);
    });

    const menuBtn = document.createElement("button");
    menuBtn.id = "groupMenuBtn";
    menuBtn.title = "グループ管理";
    menuBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>';
    menuBtn.onclick = () => openGroupModal();
    bar.appendChild(menuBtn);
  }

  function addCategory(name) {
    name = (name || "").trim();
    if (!name) { render(); return; }
    const color = ACCENTS[categories.length % ACCENTS.length];
    const id = "cat_" + Date.now();
    categories.push({ id, name, color, sites: [] });
    activeId = id;
    save();
    render();
  }

  function removeCategory(id) {
    categories = categories.filter(c => c.id !== id);
    if (activeId === id) activeId = categories[0]?.id || null;
    save();
    render();
  }

  function moveCategory(id, dir) {
    const idx = categories.findIndex(c => c.id === id);
    if (idx < 0) return;
    const target = idx + dir;
    if (target < 0 || target >= categories.length) return;
    [categories[idx], categories[target]] = [categories[target], categories[idx]];
    save();
    renderGroupList();
    renderTabs();
  }

  function duplicateCategory(id) {
    const cat = categories.find(c => c.id === id);
    if (!cat) return;
    const newId = "cat_" + Date.now();
    const newSites = cat.sites.map((s, i) => ({ id: "s_" + Date.now() + "_" + i, title: s.title, url: s.url }));
    const color = ACCENTS[categories.length % ACCENTS.length];
    categories.push({ id: newId, name: cat.name + "のコピー", color, sites: newSites });
    save();
    renderGroupList();
    renderTabs();
  }

  function renameCategory(id, name) {
    name = (name || "").trim();
    if (name) {
      const cat = categories.find(c => c.id === id);
      if (cat) cat.name = name;
      save();
    }
    editingCatId = null;
    render();
  }

  function moveSite(siteId, dir) {
    const cat = getActive();
    if (!cat) return;
    const idx = cat.sites.findIndex(s => s.id === siteId);
    if (idx < 0) return;
    const target = idx + dir;
    if (target < 0 || target >= cat.sites.length) return;
    const arr = cat.sites;
    [arr[idx], arr[target]] = [arr[target], arr[idx]];
    save();
    renderGrid();
  }

  function removeSite(siteId) {
    const cat = getActive();
    if (!cat) return;
    cat.sites = cat.sites.filter(s => s.id !== siteId);
    save();
    render();
  }

  function addSite(url, title, galaxy) {
    url = (url || "").trim();
    title = (title || "").trim();
    if (!url) return;
    if (!/^https?:\/\//i.test(url)) url = "https://" + url;
    if (!title) {
      try { title = new URL(url).hostname.replace(/^www\./, ""); } catch { title = url; }
    }
    const cat = getActive();
    if (!cat) return;
    cat.sites.push({ id: "s_" + Date.now(), title, url, galaxy: !!galaxy });
    save();
    closeModal();
    render();
  }

  function updateSite(siteId, url, title, galaxy) {
    url = (url || "").trim();
    title = (title || "").trim();
    if (!url) return;
    if (!/^https?:\/\//i.test(url)) url = "https://" + url;
    if (!title) {
      try { title = new URL(url).hostname.replace(/^www\./, ""); } catch { title = url; }
    }
    const cat = getActive();
    if (!cat) return;
    const s = cat.sites.find(s => s.id === siteId);
    if (!s) return;
    s.url = url;
    s.title = title;
    s.galaxy = !!galaxy;
    save();
    closeModal();
    render();
  }

  function moveSiteToGroup(siteId, targetCatId) {
    const cat = getActive();
    if (!cat) return;
    const idx = cat.sites.findIndex(s => s.id === siteId);
    if (idx < 0) return;
    const target = categories.find(c => c.id === targetCatId);
    if (!target) return;
    const [s] = cat.sites.splice(idx, 1);
    target.sites.push(s);
    save();
    closeModal();
    render();
  }

  function copySiteToGroup(siteId, targetCatId) {
    const cat = getActive();
    if (!cat) return;
    const s = cat.sites.find(s => s.id === siteId);
    if (!s) return;
    const target = categories.find(c => c.id === targetCatId);
    if (!target) return;
    target.sites.push({ id: "s_" + Date.now(), title: s.title, url: s.url, galaxy: !!s.galaxy });
    save();
    closeModal();
    render();
  }

  function submitSite() {
    const url = document.getElementById("siteUrlInput").value;
    const title = document.getElementById("siteTitleInput").value;
    const galaxy = document.getElementById("siteGalaxyCheck").checked;
    if (editingSiteId) updateSite(editingSiteId, url, title, galaxy);
    else addSite(url, title, galaxy);
  }

  function renderGrid() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    const cat = getActive();
    const sites = (cat?.sites || []).filter(s =>
      query.trim() === "" ? true :
      s.title.toLowerCase().includes(query.toLowerCase()) || s.url.toLowerCase().includes(query.toLowerCase())
    );

    sites.forEach((s, i) => {
      const card = document.createElement("a");
      card.className = "card";
      card.href = s.galaxy ? toIntentUrl(s.url) : s.url;
      card.target = "_blank";
      card.rel = "noreferrer";
      card.addEventListener("click", (e) => { if (reorderMode) e.preventDefault(); });

      const thumb = document.createElement("div");
      thumb.className = "card-thumb";
      thumb.style.border = "1.5px dashed " + (cat?.color || "#DCD4C6") + "55";
      const fav = faviconFor(s.url);
      if (fav) {
        const img = document.createElement("img");
        img.src = fav;
        img.onerror = () => { img.style.display = "none"; };
        thumb.appendChild(img);
      } else {
        thumb.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C6BDAC" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';
      }
      card.appendChild(thumb);

      const row = document.createElement("div");
      row.className = "card-row";
      const title = document.createElement("span");
      title.className = "card-title";
      title.textContent = s.title;
      row.appendChild(title);

      if (reorderMode) {
        const moveWrap = document.createElement("div");
        moveWrap.className = "card-move";
        const up = document.createElement("button");
        up.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>';
        up.disabled = i === 0;
        up.onclick = (e) => { e.preventDefault(); moveSite(s.id, -1); };
        moveWrap.appendChild(up);
        const down = document.createElement("button");
        down.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>';
        down.disabled = i === sites.length - 1;
        down.onclick = (e) => { e.preventDefault(); moveSite(s.id, 1); };
        moveWrap.appendChild(down);
        row.appendChild(moveWrap);
      } else {
        const edit = document.createElement("button");
        edit.className = "card-del";
        edit.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>';
        edit.onclick = (e) => { e.preventDefault(); openModal(s); };
        row.appendChild(edit);
        const del = document.createElement("button");
        del.className = "card-del";
        del.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
        del.onclick = (e) => { e.preventDefault(); removeSite(s.id); };
        row.appendChild(del);
      }
      card.appendChild(row);

      grid.appendChild(card);
    });

    if (sites.length === 0) {
      const empty = document.createElement("div");
      empty.id = "emptyMsg";
      empty.style.display = "block";
      empty.textContent = query !== ""
        ? "「" + query + "」に一致するサイトがないで"
        : "右上の＋からサイトを追加してな";
      grid.appendChild(empty);
    }
  }

  let editingSiteId = null;

  function openModal(site) {
    const cat = getActive();
    const moveSection = document.getElementById("moveSection");
    if (site) {
      editingSiteId = site.id;
      document.getElementById("modalTitle").textContent = "サイトを編集";
      document.getElementById("siteUrlInput").value = site.url;
      document.getElementById("siteTitleInput").value = site.title;
      document.getElementById("siteGalaxyCheck").checked = !!site.galaxy;
      document.getElementById("modalSubmit").textContent = "保存する";

      const select = document.getElementById("moveTargetSelect");
      select.innerHTML = "";
      const others = categories.filter(c => c.id !== cat?.id);
      others.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.id;
        opt.textContent = c.name;
        select.appendChild(opt);
      });
      const hasOthers = others.length > 0;
      document.getElementById("moveBtn").disabled = !hasOthers;
      document.getElementById("copyBtn").disabled = !hasOthers;
      select.disabled = !hasOthers;
      document.getElementById("moveLabel").textContent = hasOthers ? "別のグループへ" : "他のグループがまだないで";
      moveSection.classList.add("show");
    } else {
      editingSiteId = null;
      document.getElementById("modalTitle").textContent = (cat?.name || "") + " にサイトを追加";
      document.getElementById("siteUrlInput").value = "";
      document.getElementById("siteTitleInput").value = "";
      document.getElementById("siteGalaxyCheck").checked = false;
      document.getElementById("modalSubmit").textContent = "追加する";
      moveSection.classList.remove("show");
    }
    document.getElementById("modalOverlay").classList.add("open");
    setTimeout(() => document.getElementById("siteUrlInput").focus(), 0);
  }
  function closeModal() {
    editingSiteId = null;
    document.getElementById("modalOverlay").classList.remove("open");
  }

  document.getElementById("modalOverlay").addEventListener("click", (e) => {
    if (e.target.id === "modalOverlay") closeModal();
  });
  document.getElementById("modalClose").addEventListener("click", closeModal);
  document.getElementById("addSiteBtn").addEventListener("click", () => openModal());
  document.getElementById("reorderBtn").addEventListener("click", () => {
    reorderMode = !reorderMode;
    const btn = document.getElementById("reorderBtn");
    btn.classList.toggle("active", reorderMode);
    btn.title = reorderMode ? "完了" : "並び替え";
    btn.innerHTML = reorderMode
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>'
      : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 3 4 7l4 4"/><path d="M4 7h16"/><path d="M16 21l4-4-4-4"/><path d="M20 17H4"/></svg>';
    query = "";
    document.getElementById("searchInput").value = "";
    document.getElementById("searchInput").disabled = reorderMode;
    renderGrid();
  });
  document.getElementById("modalSubmit").addEventListener("click", submitSite);
  document.getElementById("moveBtn").addEventListener("click", () => {
    if (!editingSiteId) return;
    const targetId = document.getElementById("moveTargetSelect").value;
    if (targetId) moveSiteToGroup(editingSiteId, targetId);
  });
  document.getElementById("copyBtn").addEventListener("click", () => {
    if (!editingSiteId) return;
    const targetId = document.getElementById("moveTargetSelect").value;
    if (targetId) copySiteToGroup(editingSiteId, targetId);
  });
  document.getElementById("siteTitleInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") submitSite();
  });
  document.getElementById("searchInput").addEventListener("input", (e) => {
    query = e.target.value;
    renderGrid();
  });

  function renderGroupList() {
    const list = document.getElementById("groupList");
    list.innerHTML = "";
    categories.forEach((c, i) => {
      const row = document.createElement("div");
      row.className = "group-row";

      const dot = document.createElement("div");
      dot.className = "group-dot";
      dot.style.background = c.color;
      row.appendChild(dot);

      const name = document.createElement("span");
      name.className = "group-name";
      name.textContent = c.name;
      row.appendChild(name);

      const actions = document.createElement("div");
      actions.className = "group-actions";

      const up = document.createElement("button");
      up.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>';
      up.disabled = i === 0;
      up.onclick = () => moveCategory(c.id, -1);
      actions.appendChild(up);

      const down = document.createElement("button");
      down.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>';
      down.disabled = i === categories.length - 1;
      down.onclick = () => moveCategory(c.id, 1);
      actions.appendChild(down);

      const dup = document.createElement("button");
      dup.title = "複製";
      dup.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
      dup.onclick = () => duplicateCategory(c.id);
      actions.appendChild(dup);

      row.appendChild(actions);
      list.appendChild(row);
    });
  }

  function openGroupModal() {
    renderGroupList();
    document.getElementById("groupModalOverlay").classList.add("open");
  }
  function closeGroupModal() {
    document.getElementById("groupModalOverlay").classList.remove("open");
  }

  document.getElementById("groupModalOverlay").addEventListener("click", (e) => {
    if (e.target.id === "groupModalOverlay") closeGroupModal();
  });
  document.getElementById("groupModalClose").addEventListener("click", closeGroupModal);

  function render() {
    renderTabs();
    renderGrid();
  }

  render();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
